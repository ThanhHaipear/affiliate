services:
  mysql:
    image: mysql:8.4
    container_name: affiliate_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME_DB_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tiepthi_lienket}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-CHANGE_ME_DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./back_end
      dockerfile: Dockerfile
    container_name: affiliate_backend
    restart: unless-stopped
    env_file:
      - ./back_end/.env.docker
    environment:
      HOST: 0.0.0.0
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
